  claim: AES-256-GCM uses a 96-bit nonce; because that nonce space is too small to safely pick at random
    across many messages, a birthday-bound collision (nonce reuse) becomes likely after roughly a few
    billion messages under one key, and nonce reuse with GCM is catastrophic (it leaks the authentication
    key / breaks confidentiality and integrity), so guidance is to use a counter or rekey (e.g. before
    ~350 GB / ~2^32 messages under one key). XChaCha20-Poly1305 extends the nonce to 192 bits (24 bytes),
    which is large enough to choose nonces at random with no practical collision risk under the same key,
    making it the misuse-resistant choice when random nonces are desired.
