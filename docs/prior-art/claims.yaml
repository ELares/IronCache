# SPDX-License-Identifier: MIT OR Apache-2.0
#
# IronCache prior-art claim record: the version-pinned source of record.
#
# This file is the SINGLE descriptive source of truth for every numeric or
# version-specific statement that IronCache's prose (docs/PRIOR_ART.md, the
# README, the research docs, and the design issues) asserts about another
# system. It is strictly DESCRIPTIVE: it records what an upstream system does at
# a pinned version, never what IronCache should do. Prescriptive IronCache
# decisions live in the design issues, never here.
#
# Contract:
#   * Every load-bearing number in the prose carries an "[id]" tag naming an
#     entry below. The prose MUST agree with the value pinned here; this file
#     wins on any disagreement.
#   * scripts/ci/check-prior-art-claims.sh asserts that every "[id]" cited in
#     docs/PRIOR_ART.md exists below and that every id is unique. It does not
#     re-fetch sources; upstream drift is caught by accessed_date going stale.
#
# Provenance: claims were gathered by AI research agents from primary sources,
# then load-bearing or non-high-confidence claims were re-checked by an
# independent adversarial verifier. A subset was re-audited again in the
# pre-implementation issue audit (verification.reaudited = 2026-06-13). The
# "verification" block records the verdict (confirmed / corrected / refuted /
# uncertain / self-verified); where the verdict is "corrected" the "value" is
# the corrected value and the prior reading is kept under original_value.
