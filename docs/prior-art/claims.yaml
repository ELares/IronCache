  claim: 'The standard envelope-encryption pattern is: encrypt the data with a locally-generated data
    encryption key (DEK), then encrypt (''wrap'') the DEK with a separate key-encryption key (KEK) held
    in a KMS, and store the wrapped DEK alongside the ciphertext. The plaintext KEK never leaves the KMS/HSM;
    to read the data you call KMS to unwrap the DEK, then use the DEK to decrypt. This limits blast radius
