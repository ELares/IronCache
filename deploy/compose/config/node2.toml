#
# IronCache node 2 of a 3-node Raft-governed cluster (docker-compose).
# See node1.toml for the full explanation; only cluster_announce_id differs.

bind = "0.0.0.0"
port = 6379

cluster_enabled = true
cluster_mode = "raft"

# THIS node's stable identity (node 2's topology entry id).
cluster_announce_id = "2222222222222222222222222222222222222222"

data_dir = "/var/lib/ironcache"

save_interval_secs = 900
save_min_changes = 1

min_replicas_to_write = 0

[[cluster_topology.nodes]]
id = "1111111111111111111111111111111111111111"
host = "ironcache-1"
port = 6379
slots = [[0, 5460]]

[[cluster_topology.nodes]]
id = "2222222222222222222222222222222222222222"
host = "ironcache-2"
port = 6379
slots = [[5461, 10922]]

[[cluster_topology.nodes]]
id = "3333333333333333333333333333333333333333"
host = "ironcache-3"
port = 6379
slots = [[10923, 16383]]
