{{- if .Values.metrics.prometheusRule.enabled }}
# The IronCache alerting rules as a Prometheus Operator PrometheusRule (requires the
# monitoring.coreos.com CRD). The rule bodies live in alerts/ironcache-alerts.yml in the chart --
# the SAME file you can hand to a plain Prometheus via `rule_files:` and validate with
# `promtool check rules` -- so there is one source of truth for both consumption paths.
#
# GOTCHA: the Operator only picks up rules its `ruleSelector` matches. kube-prometheus-stack
# commonly selects on `release: <its helm release>`, so if your alerts never show up, set
# metrics.prometheusRule.additionalLabels to satisfy that selector, e.g.
#   --set metrics.prometheusRule.additionalLabels.release=kube-prometheus-stack
# Off by default (the CRD is usually absent on k3s / a bare cluster).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "ironcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ironcache.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # The file is exactly a `groups:` document, i.e. already the PrometheusRule spec shape.
{{ .Files.Get "alerts/ironcache-alerts.yml" | indent 2 }}
{{- end }}
