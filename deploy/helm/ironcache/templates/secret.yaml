{{- /* SPDX-License-Identifier: MIT OR Apache-2.0 */ -}}
{{- /*
One chart-managed Secret holding the cluster_secret, the requirepass, and any
inline TLS material. Keys are only written when the corresponding feature is
enabled AND not delegated to an existingSecret. If every secret is delegated to
an existingSecret (or disabled), this Secret is not rendered at all.
*/ -}}
{{- $fullname := include "ironcache.fullname" . -}}
{{- $needSecret := false -}}
{{- if and .Values.cluster.enabled (not .Values.clusterSecret.existingSecret) -}}{{- $needSecret = true -}}{{- end -}}
{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) -}}{{- $needSecret = true -}}{{- end -}}
{{- if and .Values.clusterTls.enabled (not .Values.clusterTls.existingSecret) -}}{{- $needSecret = true -}}{{- end -}}
{{- if and .Values.tls.enabled (not .Values.tls.existingSecret) -}}{{- $needSecret = true -}}{{- end -}}
{{- if $needSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullname }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ironcache.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.cluster.enabled (not .Values.clusterSecret.existingSecret) }}
  # The shared peer-authentication secret (cluster_secret). PRECEDENCE:
  #   1. clusterSecret.value (explicit -- REQUIRED for GitOps/production so it is
  #      source-controlled and NEVER rotates), else
  #   2. the value already in THIS release's Secret, PRESERVED across `helm upgrade`
  #      via lookup (so a bare upgrade does NOT rotate it and split the cluster), else
  #   3. a fresh random on the FIRST install.
  # lookup is empty under `helm template`/`--dry-run`/GitOps-without-cluster, so those
  # paths regenerate -- set clusterSecret.value for GitOps (see ironcache.clusterSecretAuto).
  # An explicit value SHORT-CIRCUITS the helper (no lookup) via if/else -- `default` would
  # evaluate the helper regardless, running the lookup even when a value is set.
  {{- if .Values.clusterSecret.value }}
  cluster_secret: {{ .Values.clusterSecret.value | quote }}
  {{- else }}
  cluster_secret: {{ include "ironcache.clusterSecretAuto" . | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
  # The client AUTH password (requirepass); the server hashes it at rest.
  requirepass: {{ required "auth.enabled requires auth.password or auth.existingSecret" .Values.auth.password | quote }}
  {{- end }}
  {{- if and .Values.clusterTls.enabled (not .Values.clusterTls.existingSecret) }}
  cluster.crt: {{ required "clusterTls.enabled requires clusterTls.cert or clusterTls.existingSecret" .Values.clusterTls.cert | quote }}
  cluster.key: {{ required "clusterTls.enabled requires clusterTls.key or clusterTls.existingSecret" .Values.clusterTls.key | quote }}
  # The peer-verification CA. The StatefulSet ALWAYS mounts cluster.ca and points
  # IRONCACHE_CLUSTER_CA_PATH at it, so this key must always exist when clusterTls is on: a
  # None ca_path without cluster_tls_insecure_skip_verify hard-fails boot (runtime tls.rs). When
  # clusterTls.ca is empty, the self-signed cluster cert is ITS OWN CA (docs/TLS.md points both
  # cluster_tls_cert_path and cluster_ca_path at the same cert), so default cluster.ca to the cert.
  cluster.ca: {{ .Values.clusterTls.ca | default .Values.clusterTls.cert | quote }}
  {{- end }}
  {{- if and .Values.tls.enabled (not .Values.tls.existingSecret) }}
  tls.crt: {{ required "tls.enabled requires tls.cert or tls.existingSecret" .Values.tls.cert | quote }}
  tls.key: {{ required "tls.enabled requires tls.key or tls.existingSecret" .Values.tls.key | quote }}
  {{- end }}
{{- end }}
