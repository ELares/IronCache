{{- /*
PodDisruptionBudget that preserves Raft quorum through voluntary disruptions
(node drain, rolling node upgrade). maxUnavailable bounds how many pods a drain
can evict at once; with the default 1 a 3-node cluster always keeps its 2-node
majority. Rendered only for 3+ replicas (N=1 has no quorum to protect; N=2 cannot
tolerate any eviction without losing its 2-node majority).
*/ -}}
{{- if ge (int .Values.replicas) 3 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ironcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ironcache.labels" . | nindent 4 }}
spec:
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "ironcache.selectorLabels" . | nindent 6 }}
{{- end }}
