{{- if and .Values.console.enabled .Values.console.ingress.enabled }}
{{- $httpPort := int .Values.console.httpPort -}}
{{- $svc := include "ironcache.console.fullname" . -}}
# Ingress for the CONSOLE UI ONLY (plain HTTP). Requires console.enabled.
#
# It deliberately does NOT front the cache: RESP is an L4/TCP protocol, so an HTTP Ingress
# cannot proxy it. Expose the cache with the client Service (ClusterIP for in-cluster clients),
# a NodePort/LoadBalancer, or a Traefik `IngressRouteTCP` -- see deploy/K3S.md. And note a
# single L7/L4 endpoint in front of a raft cluster is NOT cluster-aware (nodes answer MOVED for
# slots they do not own), so prefer cluster-aware clients on the headless per-pod DNS.
#
# The console serves the operator UI + API: put real authentication in front of it (an
# ingress-level authn middleware and/or console.tokensSecret), and prefer TLS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ironcache.console.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ironcache.console.labels" . | nindent 4 }}
  {{- with .Values.console.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.console.ingress.className }}
  # e.g. "traefik" on stock k3s, "nginx" elsewhere. Empty = the cluster's default IngressClass.
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.console.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.console.ingress.hosts }}
    - {{- with .host }}
      host: {{ . | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | default "/" | quote }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $svc }}
                port:
                  number: {{ $httpPort }}
          {{- end }}
    {{- end }}
{{- end }}
