{{- if .Values.metrics.serviceMonitor.enabled }}
# Prometheus Operator ServiceMonitor scraping /metrics on the headless Service.
# Requires the monitoring.coreos.com CRD to be installed in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ironcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ironcache.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ironcache.selectorLabels" . | nindent 6 }}
  {{- with .Values.metrics.serviceMonitor.sampleLimit }}
  # Drop a scrape that would ingest more than this many samples (0 = unlimited). A blast
  # radius cap for a large cluster / a cardinality regression.
  sampleLimit: {{ int . }}
  {{- end }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      {{- with .Values.metrics.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ . }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.relabelings }}
      # Applied to the TARGET before scraping (relabel_configs).
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.metrics.serviceMonitor.metricRelabelings }}
      # Applied to each scraped SAMPLE (metric_relabel_configs) -- the lever for dropping
      # high-cardinality series before they hit storage.
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
