# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Default values for the IronCache chart. PRODUCTION posture is documented inline;
# the out-of-the-box defaults are safe (auth + TLS are OFF but flagged; persistence
# is ON; a quorum-preserving PDB is set). Read the comments before going to prod.

image:
  repository: ghcr.io/elares/ironcache
  # Pin to an immutable version tag in production (e.g. "0.1.0" -- the registry
  # tag has NO leading "v"; the image CI strips it), NOT "latest".
  tag: "latest"
  pullPolicy: IfNotPresent
# Image pull secrets for a private registry (GHCR private packages):
imagePullSecrets: []

# Number of IronCache nodes. For a Raft cluster keep this ODD (3, 5, 7) so a
# majority quorum is unambiguous. 1 = a standalone (non-clustered) node.
replicas: 3

# --- Cluster / Raft -----------------------------------------------------------
cluster:
  # Turn on Raft-governed clustering (cluster_enabled + cluster_mode=raft). When
  # false the chart deploys `replicas` INDEPENDENT standalone nodes (no peering),
  # which is only sensible with replicas=1. Set true for a real cluster.
  enabled: true
  # The 16384 hash slots are split EVENLY across `replicas` nodes by the topology
  # template (deploy/helm/ironcache/templates/configmap.yaml). No manual slot math.
  #
  # Per-node identity + the peer list are TOML-only (cluster_topology is an
  # array-of-tables with no env form), so the chart renders the full topology into
  # a ConfigMap and an init container stamps THIS pod's stable cluster_announce_id
  # from its StatefulSet ordinal. Peers resolve by the headless-Service DNS
  # `<pod>.<svc>.<ns>.svc.cluster.local`, lazily at Raft dial time.

  # WRITE-SIDE durability guardrail (min_replicas_to_write): the minimum in-sync
  # replicas an owner must have before it ACCEPTS a write, so an acknowledged write
  # survives that many node losses. 0 = disabled (Redis default). Keep 0 with this chart:
  # the static topology has no replicas (runtime-Raft only), so >= 1 fails writes -NOREPLICAS.
  minReplicasToWrite: 0
  # Raft-log compaction threshold (entries above the last snapshot). Bounds the
  # on-disk log + restart replay.
  raftSnapshotThreshold: 1024

# --- Persistence (durable snapshot + Raft log under data_dir) -----------------
persistence:
  # data_dir is the SINGLE enable switch for durable persistence AND the durable
  # Raft log. Strongly recommended for any cluster (the Raft log must survive a
  # pod restart). When false the pod uses an emptyDir (data lost on reschedule).
  enabled: true
  # The PVC mount path == data_dir.
  mountPath: /var/lib/ironcache
  size: 10Gi
  # storageClassName: "" leaves the cluster default; set an SSD class in prod.
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  # Periodic background save policy (#58): SAVE every `saveIntervalSecs` if at
  # least `saveMinChanges` keyspace writes happened since the last save. 0 = only
  # explicit SAVE/BGSAVE + save-on-shutdown persist. This bounds the RPO.
  saveIntervalSecs: 900
  saveMinChanges: 1

# --- Authentication -----------------------------------------------------------
auth:
  # Client AUTH (requirepass). STRONGLY recommended in production. When enabled the
  # password is read from a Secret (created by the chart from `auth.password`, or
  # referenced via `auth.existingSecret`) and exposed to the pod as
  # IRONCACHE_REQUIREPASS; the server hashes it at rest (SHA-256).
  enabled: false
  # Inline password (chart creates the Secret). Prefer existingSecret in prod so
  # the secret is not in values/Helm release history.
  password: ""
  # Reference an existing Secret instead of creating one. The key must be `requirepass`.
  existingSecret: ""

# --- Intra-cluster transport security (bus + replication) ---------------------
clusterSecret:
  # The shared cluster secret (cluster_secret): every node presents it in a
  # constant-time peer handshake on the bus + repl links, so a stranger cannot join
  # the bus / forge RAFTMSG / pull replication. If left empty (and no existingSecret),
  # it is auto-generated on the FIRST install and PRESERVED across `helm upgrade` (via a
  # lookup of the existing Secret), so a bare upgrade no longer rotates it. BUT under
  # GitOps (Argo/Flux) or any `helm template`/`--dry-run` pipeline the lookup is blind and
  # the value regenerates every sync -- so for GitOps and reproducible/production installs
  # you MUST set an explicit value here (or clusterSecret.existingSecret), which is
  # source-controlled and never rotates. Generate one with e.g. `openssl rand -hex 20`.
  value: ""
  existingSecret: ""

clusterTls:
  # Encrypt the node-to-node bus + replication links (cluster_tls=on). Without TLS
  # the cluster_secret travels in cleartext on the pod network; enable for a
  # zero-trust network. Requires a cert + key (+ optionally a CA). A self-signed
  # cluster cert that is ALSO used as the CA verifies against itself (no external PKI).
  enabled: false
  # Provide the PEM cert/key/CA inline (chart puts them in the Secret) or reference
  # an existing Secret with keys cluster.crt / cluster.key / cluster.ca.
  cert: ""
  key: ""
  # The peer-verification CA. Leave EMPTY to use the self-signed cluster cert as its own
  # CA (the chart then writes cluster.ca = cert); set it to a distinct CA PEM for a stricter
  # external-PKI trust chain.
  ca: ""
  existingSecret: ""

tls:
  # Put the PUBLIC client RESP listener on TLS (tls=on). Separate from clusterTls.
  # Requires a public-facing cert + key (PEM).
  enabled: false
  cert: ""
  key: ""
  existingSecret: ""

# --- Service ports ------------------------------------------------------------
service:
  # Client RESP port (Config.port). The cluster-bus (port+10000) and replication
  # (port+20000) ports are derived from this and exposed only on the headless
  # Service for intra-cluster traffic.
  clientPort: 6379
  # The client Service type. ClusterIP is correct for in-cluster clients; with Raft
  # routing (MOVED redirects to a pod's advertised host) a single LB in front of all
  # pods is NOT cluster-aware, so prefer cluster-aware clients hitting the headless
  # Service or per-pod DNS.
  type: ClusterIP

# The HTTP port serving /metrics + /livez + /readyz (the --metrics-addr port). The
# liveness/readiness probes hit /livez and /readyz here.
metrics:
  port: 9121
  # Create a ServiceMonitor for the Prometheus Operator (requires the CRD).
  serviceMonitor:
    enabled: false
    interval: 30s

# --- Resources ----------------------------------------------------------------
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    # No CPU limit by default (avoid CFS throttling of the per-core runtime); set
    # one if your platform requires it. A MEMORY LIMIT IS STRONGLY RECOMMENDED for OOM
    # safety: when maxmemory is left unset (the default below), IronCache AUTO-DERIVES it
    # from this cgroup limit (~70%) at boot, so the cache EVICTS under pressure (its
    # default allkeys-lru policy) instead of being OOMKilled (exit 137 -> data loss).
    # WITHOUT a memory limit the derivation cannot fire and the cache runs UNBOUNDED
    # (a loud boot log line says so). The ~30% headroom covers jemalloc overhead + the
    # during-save copy-on-write transient; tune it with IRONCACHE_MAXMEMORY_AUTO_FRACTION
    # (e.g. via extraEnv), or set maxmemory explicitly in extraConfig to override entirely.
    memory: "2Gi"

# Extra IronCache config: any maxmemory / maxmemory_policy / timeout overrides
# flow in here and are appended to the rendered TOML verbatim. Keys are the REAL
# TOML keys, underscore spelling (maxmemory, maxmemory_policy, timeout, maxclients,
# output_buffer_limit, databases, shards; see KNOWN_TOML_KEYS in
# crates/ironcache-config/src/lib.rs). The TOML parse is STRICT: a hyphen spelling
# like maxmemory-policy fails the boot. Log level is not a TOML key; use logLevel
# below (the --log-level arg).
#
# maxmemory: LEAVE UNSET for OOM safety -- it auto-derives from resources.limits.memory
# (~70%) at boot (see the resources note above). Only set it explicitly to pin a
# specific ceiling (which disables the auto-derivation). Example of an explicit pin:
#   extraConfig: |
#     maxmemory = 1610612736
#     maxmemory_policy = "allkeys-lru"
extraConfig: ""

# Log level passed as --log-level (error|warn|info|debug|trace).
logLevel: info

# --- Scheduling ---------------------------------------------------------------
# Spread pods across nodes so a single node failure cannot take down a quorum.
podAntiAffinity:
  # "soft" = preferred (best-effort spread, schedulable on small clusters);
  # "hard" = required (one pod per node, needs >= replicas nodes).
  type: soft
  topologyKey: kubernetes.io/hostname

nodeSelector: {}
tolerations: []

# --- Disruption budget --------------------------------------------------------
# maxUnavailable=1 lets a voluntary disruption (drain/upgrade) take at most one pod
# at a time, so a 3-node cluster keeps its 2-node majority quorum throughout a
# rolling node maintenance. For replicas=5 you may raise this to 2 and still keep
# quorum; never set it so high that a drain can break majority.
pdb:
  maxUnavailable: 1

# --- Pod security -------------------------------------------------------------
# The image already runs as nonroot (uid 65532); fsGroup makes the PVC writable by it.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  # Only chown the PVC when its top-level ownership does not already match fsGroup, instead of a
  # RECURSIVE chown of the whole volume on EVERY mount -- which on a large (multi-GB) data_dir makes
  # every pod restart slow and eats into the startupProbe budget.
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# StatefulSet rolling-update + termination tuning. terminationGracePeriodSeconds
# must cover preStop.sleepSeconds + the connection drain + the save-on-exit; if it is
# too small the kubelet SIGKILLs mid-save and truncates the snapshot. Size it (and the
# startupProbe budget below) from your worst-case dataset: roughly
# preStopSleep + drain(~5s) + (snapshot_bytes / save_throughput) + margin. Raise to
# 120-180s for datasets over ~5GB or slow storage.
terminationGracePeriodSeconds: 60

# --- Graceful lifecycle (P0 hardening) ----------------------------------------
# Startup probe: a large snapshot RELOAD on boot can take far longer than the liveness
# budget, which would CrashLoopBackOff a healthy node mid-load. The startupProbe hits
# /readyz and SUSPENDS liveness+readiness until load-on-boot completes. Size
# failureThreshold * periodSeconds to the worst-case reload time (default 60*10 = 10 min;
# raise failureThreshold for multi-GB datasets or slow/edge storage). IN RAFT MODE /readyz
# also waits for a leader, so the budget must cover the worst-case leader-election time too
# (relevant on a cold cluster-wide restart where every node blocks on its peers) -- raise
# failureThreshold if a slow election could otherwise CrashLoop a healthy node.
startupProbe:
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 60

# preStop lame-duck: after the pod is marked for deletion, sleep this many seconds so the
# Service endpoint deprograms (kube-proxy stops routing NEW clients here) BEFORE the
# process is drained -- avoiding client-visible resets on every rolling update. Uses the
# native SleepAction (alpha 1.29, beta/default-on 1.30, GA 1.34); the distroless image is
# SHELL-FREE, so an exec `sleep` hook would silently fail. The chart auto-gates this block
# on the cluster version (semverCompare >= 1.29), so on OLDER clusters it is simply omitted
# and the server's readiness-fail-on-drain takes over (/readyz returns 503 the moment drain
# starts) -- no broken install. Set 0 to disable it explicitly. Keep it comfortably under
# terminationGracePeriodSeconds.
preStop:
  sleepSeconds: 10

# --- Rolling-update controls --------------------------------------------------
# StatefulSet RollingUpdate: pods roll ONE AT A TIME by descending ordinal, each gated by the
# readinessProbe + minReadySeconds. `partition` is a canary lever: freeze ordinals < partition,
# verify, then patch it down to 0 to roll the rest. 0 = roll everything (the normal case).
updateStrategy:
  partition: 0
# A "ready" pod must stay ready this long before the rollout advances to the next ordinal, so a
# flapping raft pod does not let the rollout march through the whole cluster. This -- not the PDB --
# is the rollout soak lever (a PDB only gates voluntary evictions, never a StatefulSet update).
minReadySeconds: 15
# Bound retained ControllerRevision history (etcd hygiene; unbounded with manual partition patches).
revisionHistoryLimit: 3

# --- Zone spread (multi-AZ) ---------------------------------------------------
# OPTIONAL topologySpreadConstraints so quorum survives a ZONE outage (podAntiAffinity above only
# spreads across NODES). Enable on a multi-AZ cluster; leave off on single-zone / k3s edge. Default
# whenUnsatisfiable=ScheduleAnyway so a constrained cluster still schedules (best-effort spread).
topologySpread:
  enabled: false
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway

# Optional init container image (BusyBox) used to stamp the per-pod
# cluster_announce_id from the StatefulSet ordinal. Has a shell; never reaches the
# main runtime path.
initImage:
  repository: busybox
  tag: "1.36"
  pullPolicy: IfNotPresent

# --- Console (epic #352, issue #363) ------------------------------------------
# The IronCache monitoring/management console: a SEPARATE, STATELESS Deployment
# (not part of the cache StatefulSet), disabled by default. When enabled the chart
# renders a Deployment of N identical replicas behind a ClusterIP Service, plus a
# PodDisruptionBudget for 2+ replicas. It shares the image/anti-affinity/resource
# posture but holds no state: no PVC, no per-pod identity, no headless Service.
console:
  enabled: false
  # N stateless replicas behind the Service below. 2+ gives HA (and a PDB).
  replicas: 2
  image:
    repository: ghcr.io/elares/ironcache-console
    # Pin to an immutable version in production, NOT "latest".
    tag: "latest"
    pullPolicy: IfNotPresent
  # The single HTTP port serving /livez + /readyz + /metrics + the UI + /api/*.
  httpPort: 9180
  service:
    type: ClusterIP
  # Seed nodes the console polls. Point at the cache client Service DNS, e.g.
  #   - "ironcache.<namespace>.svc.cluster.local:6379"
  # Empty leaves the poll loop idle (and /readyz never ready), so set this.
  seeds: []
  # A SHARED Prometheus URL is the HA-consistent history backend (every replica
  # queries the same store). Leave empty only for a single replica; with multiple
  # replicas an unset URL falls back to per-replica embedded history, which the
  # console WARNS about on a non-loopback bind (each replica shows a different
  # trend window). e.g. "http://prometheus.monitoring.svc.cluster.local:9090".
  prometheusUrl: ""
  # The least-privilege ACL user the console dials nodes as (deploy/aclfile.console.example).
  nodeUser: console_monitor
  # The node password: reference an existing Secret; the chart mounts its `key` as
  # a file and points IRONCACHE_CONSOLE_NODE_PASSWORD_FILE at it (never inline).
  nodePasswordSecret:
    existingSecret: ""
    key: console_node_password
  # The API RBAC tokens (read + admin). Reference an existing Secret; the keys are
  # injected as env (optional, so an absent key is fine). Configuring a token flips
  # the console into ENFORCE mode -- set at least the read token for a non-loopback
  # (behind-LB) deployment, or privileged routes return 401.
  tokensSecret:
    existingSecret: ""
    readTokenKey: console_read_token
    adminTokenKey: console_admin_token
  # Per-replica resource envelope (smaller than a cache node: the console is I/O,
  # not memory, bound).
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      memory: "256Mi"
  pdb:
    maxUnavailable: 1
  # Egress allowlist (the SSRF-containment control, #369). When enabled the chart
  # renders a NetworkPolicy that lets the console reach ONLY DNS, the cache pods
  # (RESP + metrics ports), and the history backend you list in prometheusEgress;
  # every other destination is denied. Ingress is limited to the HTTP port. Needs
  # a NetworkPolicy-aware CNI to take effect (inert / fails-open otherwise).
  networkPolicy:
    enabled: true
    # DNS egress (UDP/TCP 53). Keep on: the console resolves the cache Service DNS
    # and the history-backend host by name.
    allowDNS: true
    # Restrict who may reach the console HTTP port. Empty = allow from any source
    # ON THAT PORT (the VPN-locked Ingress / LB in front enforces who; this only
    # closes the other ports). Tighten by listing NetworkPolicyPeer entries, e.g.
    #   ingressFrom:
    #     - namespaceSelector:
    #         matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
    ingressFrom: []
    # The shared history backend (Prometheus) usually lives in another namespace,
    # so its selector is deployment-specific: supply the egress peer(s) here to
    # match your console.prometheusUrl, e.g.
    #   prometheusEgress:
    #     - to:
    #         - namespaceSelector:
    #             matchLabels: { kubernetes.io/metadata.name: monitoring }
    #       ports:
    #         - { protocol: TCP, port: 9090 }
    # Left empty, the history queries are blocked by the policy (fail closed).
    prometheusEgress: []
    # Any extra egress rules appended verbatim (e.g. an external alertmanager).
    extraEgress: []
