# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Raw Kubernetes manifests for a 3-node IronCache Raft cluster -- the Helm-free
# path (mirrors deploy/helm/ironcache). Apply with:
#
#   kubectl create namespace ironcache
#   kubectl -n ironcache apply -f ironcache.yaml
#
# BEFORE applying in production:
#   1. Set a real cluster_secret + requirepass in the Secret below (the values
#      here are PLACEHOLDERS -- replace them or create the Secret out-of-band).
#   2. Pin the image to an immutable tag (not :latest).
#   3. Set persistence.storageClassName (storageClassName in the volumeClaimTemplate)
#      to an SSD class.
#
# The cluster topology (peer list + slots) is TOML-only, rendered into the
# ConfigMap. The per-pod cluster_announce_id is stamped by the init container from
# the pod's StatefulSet ordinal: it computes sha256("ironcache-<ordinal>")[:40],
# the SAME deterministic id the topology lists, so each pod's identity matches its
# topology entry. Peers resolve by the headless-Service DNS
# <pod>.ironcache-headless.<ns>.svc.cluster.local, lazily at Raft dial time.
#
# Ports (derived from the client port 6379):
#   6379  client RESP   | 16379 raft cluster-bus (+10000) | 26379 repl (+20000)
#   9121  /metrics + /livez + /readyz (the --metrics-addr port; probes hit it)
---
apiVersion: v1
kind: Secret
metadata:
  name: ironcache-secret
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
type: Opaque
stringData:
  # REPLACE these placeholders before production use (or delete this Secret and
  # create it out-of-band: `kubectl -n ironcache create secret generic
  # ironcache-secret --from-literal=cluster_secret=... --from-literal=requirepass=...`).
  # The cluster_secret authenticates peers on the bus + repl links; requirepass is
  # the client AUTH password (hashed at rest by the server).
  cluster_secret: "CHANGE_ME_shared_cluster_secret"
  requirepass: "CHANGE_ME_client_password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ironcache-config
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
data:
  # The base config (everything EXCEPT this pod's own cluster_announce_id, which
  # the init container prepends). 16384 slots split three ways. Node ids are
  # sha256("ironcache-<ordinal>")[:40]; the init recomputes THIS pod's id the same
  # way so its announce id matches its entry.
  ironcache.base.toml: |
    bind = "0.0.0.0"
    port = 6379
    data_dir = "/var/lib/ironcache"
    save_interval_secs = 900
    save_min_changes = 1

    cluster_enabled = true
    cluster_mode = "raft"
    min_replicas_to_write = 0
    raft_snapshot_threshold = 1024

    [[cluster_topology.nodes]]
    id = "fc3caa5779acc7caa38e793bff0091e69a5356b3"
    host = "ironcache-0.ironcache-headless.ironcache.svc.cluster.local"
    port = 6379
    slots = [[0, 5460]]

    [[cluster_topology.nodes]]
    id = "d068949a93091787ab3088270a96f6d144deadad"
    host = "ironcache-1.ironcache-headless.ironcache.svc.cluster.local"
    port = 6379
    slots = [[5461, 10922]]

    [[cluster_topology.nodes]]
    id = "5164ce03b3df8b7cd866d1c4205d66f737053bc1"
    host = "ironcache-2.ironcache-headless.ironcache.svc.cluster.local"
    port = 6379
    slots = [[10923, 16383]]

  # Stamp the per-pod cluster_announce_id (PREPENDED, so it stays top-level and is
  # not absorbed into the last [[cluster_topology.nodes]] table). The runtime image
  # is distroless/shell-free, so this runs in a BusyBox init container.
  stamp-identity.sh: |
    #!/bin/sh
    set -eu
    ordinal="${HOSTNAME##*-}"
    node_id="$(printf 'ironcache-%s' "$ordinal" | sha256sum | cut -c1-40)"
    printf 'cluster_announce_id = "%s"\n' "$node_id" > /run/ironcache/ironcache.toml
    cat /config/ironcache.base.toml >> /run/ironcache/ironcache.toml
    echo "stamped cluster_announce_id=${node_id} for ordinal ${ordinal}"
---
# Headless Service: stable per-pod DNS for Raft peering.
apiVersion: v1
kind: Service
metadata:
  name: ironcache-headless
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: ironcache
  ports:
    - name: client
      port: 6379
      targetPort: client
    - name: cluster-bus
      port: 16379
      targetPort: cluster-bus
    - name: repl
      port: 26379
      targetPort: repl
    - name: metrics
      port: 9121
      targetPort: metrics
---
# Client Service: single in-cluster endpoint (cluster-aware clients recommended).
apiVersion: v1
kind: Service
metadata:
  name: ironcache
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ironcache
  ports:
    - name: client
      port: 6379
      targetPort: client
---
# PodDisruptionBudget: at most one pod unavailable at a time, so a 3-node cluster
# keeps its 2-node majority quorum through a node drain / rolling upgrade.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ironcache
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ironcache
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ironcache
  namespace: ironcache
  labels:
    app.kubernetes.io/name: ironcache
spec:
  serviceName: ironcache-headless
  replicas: 3
  podManagementPolicy: Parallel
  # RollingUpdate: one at a time by descending ordinal, gated by the readinessProbe + minReadySeconds.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  minReadySeconds: 15
  revisionHistoryLimit: 3
  # DATA SAFETY: never auto-delete a data PVC (GA k8s 1.27; default is Retain regardless).
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: ironcache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ironcache
    spec:
      terminationGracePeriodSeconds: 60
      # Cache pods need no k8s API access -- restricted-PSS hardening.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        # Avoid a recursive chown of a large PVC on every mount (slow restarts).
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # Best-effort spread across nodes (use required... for a hard guarantee
          # on a cluster with >= 3 nodes).
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ironcache
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: stamp-identity
          image: busybox:1.36
          command: ["/bin/sh", "/scripts/stamp-identity.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-scripts
              mountPath: /scripts
            - name: runtime-config
              mountPath: /run/ironcache
      containers:
        - name: ironcache
          image: ghcr.io/elares/ironcache:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          args:
            - server
            - --config
            - /run/ironcache/ironcache.toml
            - --log-level
            - info
            - --metrics-addr
            - "0.0.0.0:9121"
          env:
            - name: IRONCACHE_CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: ironcache-secret
                  key: cluster_secret
            - name: IRONCACHE_REQUIREPASS
              valueFrom:
                secretKeyRef:
                  name: ironcache-secret
                  key: requirepass
          ports:
            - name: client
              containerPort: 6379
            - name: cluster-bus
              containerPort: 16379
            - name: repl
              containerPort: 26379
            - name: metrics
              containerPort: 9121
          # Startup: gates liveness+readiness until load-on-boot finishes, so a slow
          # snapshot reload does not trip liveness (60*10s = 10 min budget; raise for
          # multi-GB datasets).
          startupProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          # preStop lame-duck (native SleepAction, k8s 1.29+): endpoint deprograms before
          # drain. The distroless image is shell-free, so exec `sleep` is NOT usable.
          lifecycle:
            preStop:
              sleep:
                seconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "2Gi"
          volumeMounts:
            - name: runtime-config
              mountPath: /run/ironcache
            - name: data
              mountPath: /var/lib/ironcache
      volumes:
        - name: config
          configMap:
            name: ironcache-config
            items:
              - key: ironcache.base.toml
                path: ironcache.base.toml
        - name: config-scripts
          configMap:
            name: ironcache-config
            items:
              - key: stamp-identity.sh
                path: stamp-identity.sh
        - name: runtime-config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: ironcache
      spec:
        accessModes:
          - ReadWriteOnce
        # storageClassName: "fast-ssd"   # set an SSD class in production
        resources:
          requests:
            storage: 10Gi
