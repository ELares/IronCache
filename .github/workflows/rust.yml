# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Rust workspace CI. Mirrors the guard idiom of release.yml: a leading `guard`
# job short-circuits the whole workflow while the repo is docs-only (no root
# Cargo.toml), so the workflow is inert until the first crate lands and active
# thereafter. Gates: fmt, clippy (pedantic, -D warnings), test (ubuntu; Linux is
# the only supported deployment OS; run under cargo-nextest for process-per-test
# isolation + per-test timeouts, #533), msrv (1.85), musl static build, and the
# invariant lints (INVARIANTS.md).
name: rust

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "scripts/ci/check-rust-invariants.sh"
      - ".github/workflows/rust.yml"
      - "fuzz/**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  guard:
    name: guard (skip until a Cargo project exists)
    runs-on: ubuntu-latest
    outputs:
      has_cargo: ${{ steps.check.outputs.has_cargo }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          if [ -f Cargo.toml ] && [ -f Cargo.lock ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::repo is docs-only (no Cargo.toml/Cargo.lock); rust CI is a no-op"
          fi

  fmt:
    name: fmt
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (pedantic, -D warnings)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ${{ matrix.os }}
    # Belt-and-suspenders wall cap (#533): nextest's per-test timeout catches a hung test, and this
    # bounds the WHOLE job so a pathological run can never burn a 6-hour runner (the previous
    # `cargo test --workspace` deadlocked under parallel load with no bound).
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Linux only: IronCache targets Linux servers (the io_uring datapath is Linux-only and the
        # deployment images are Linux). macOS was dropped from CI -- it is not a supported deployment
        # OS and its runners were a persistent source of slow/flaky hangs. The single-entry matrix is
        # kept so the check name stays `test (ubuntu-latest)`. Local macOS dev still works (portable
        # tokio path); it is just no longer a merge gate.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cargo-nextest (#533): runs each test in its OWN process, isolating the shared-state /
      # port-contention deadlock that intermittently hung the old in-process `cargo test --workspace`
      # under parallel load, and enforcing a per-test timeout (see .config/nextest.toml) so a stuck
      # test is killed + named instead of hanging the job. Prebuilt binary, no compile.
      - uses: taiki-e/install-action@nextest
      - name: nextest run (workspace, all features)
        run: cargo nextest run --profile ci --workspace --all-features
      # nextest does NOT run doctests; run them separately so doc examples stay gated.
      - name: doctests
        run: cargo test --doc --workspace --all-features

  msrv:
    name: msrv (1.85)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The workspace MSRV is the edition-2024 floor (Cargo.toml rust-version).
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      # Build only (not clippy): pedantic lints track the stable toolchain, while
      # MSRV guarantees the code compiles on the declared floor.
      #
      # rust-toolchain.toml pins 1.92.0 for dev reproducibility, and a bare `cargo`
      # would honor that file (the gate would silently build with 1.92.0, not the
      # MSRV). The `+1.85.0` directive overrides the toolchain file, so this gate
      # actually exercises the declared floor.
      - run: cargo +1.85.0 build --workspace --all-features

  musl:
    name: musl static build
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # rust-toolchain.toml pins channel 1.92.0, so cargo builds with that toolchain
      # (auto-installed from the file), NOT the action's "stable" toolchain. Adding
      # the target via the action's `targets:` would attach it to "stable" and the
      # build would fail with "can't find crate for std". Add the musl target to the
      # active (pinned) toolchain here, in-repo, so `cargo build --target` resolves
      # the musl std on the same toolchain that compiles the workspace.
      - run: rustup target add x86_64-unknown-linux-musl
      - run: cargo build --release --target x86_64-unknown-linux-musl
      # #682: the RAW io_uring backend (`io_uring_raw`) is built directly on the `io-uring` crate
      # (NOT tokio-uring), specifically so the io_uring datapath can ride the static-musl release
      # that tokio-uring's `io_uring` feature CANNOT cross-build (tokio-uring pulls libc `statx`
      # types that fail against musl). This step is the regression gate for that "unblock musl"
      # guarantee: the SAME musl target must compile the binary WITH `--features io_uring_raw`.
      # (The tokio-uring `io_uring` feature is deliberately NOT built here -- it is expected to fail
      # on musl; that failure is the whole reason the raw backend exists.)
      #
      # #682 P5(a): this mirrors the EXACT invocation the release/image workflows now use to SHIP the
      # raw backend (both shipped binaries + the feature targeted at ironcache), so a change that
      # breaks the shipping build fails HERE, not at tag time.
      - name: build --features io_uring_raw (musl unblock + release-parity, #682)
        run: cargo build --release --target x86_64-unknown-linux-musl -p ironcache -p ironcache-console --features ironcache/io_uring_raw

  io-uring:
    name: io_uring datapath (Linux, default-off feature)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    timeout-minutes: 30
    # The OPTIONAL Linux io_uring backend (PROD-10 / #28, docs/design/IOURING_DATAPATH.md) is
    # default-OFF and Linux-only; this ubuntu job is the dedicated gate that BUILDS + TESTS it
    # with `--features io_uring` (the default jobs above prove the byte-unchanged default build).
    # The io_uring `Runtime` impl + the per-shard io_uring bootstrap + the owned-buffer recv/send
    # round-trip test (`accept_recv_send_roundtrip_uring`) compile and run ONLY here (the code is
    # `#[cfg(all(target_os = "linux", feature = "io_uring"))]`, so it is inert on the macOS test
    # job even under that job's `--all-features`). GitHub's ubuntu runners run a kernel with
    # io_uring, so the tokio-uring runtime starts and the round-trip exercises real submissions.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # Clippy (pedantic, -D warnings) over the io_uring feature so the Linux-only path is held to
      # the SAME lint bar as the default build (the macOS dev box cannot lint this cfg).
      - name: clippy --features io_uring
        run: cargo clippy -p ironcache-runtime -p ironcache --features io_uring --all-targets -- -D warnings
      # Build the binary with the io_uring datapath compiled in.
      - name: build --features io_uring
        run: cargo build -p ironcache-runtime -p ironcache --features io_uring
      # Run the runtime crate's tests with io_uring on (under nextest, per #533): the existing suite
      # plus the io_uring `Runtime` round-trip (accept/recv/send over a real ring) prove the
      # owned-buffer append semantics map correctly onto tokio-uring.
      - name: test --features io_uring
        run: cargo nextest run --profile ci -p ironcache-runtime --features io_uring

  dashtable:
    name: index backends (default dash arm + hashbrown-index fallback)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    timeout-minutes: 30
    # #285 stage-4 FLIPPED the default: the store's index is DASH by default, with
    # hashbrown behind the swap-style `hashbrown-index` feature. `--all-features` therefore
    # compiles the HASHBROWN arm, so the `clippy` and `test` jobs above exercise the
    # fallback workspace-wide, and the DEFAULT (dash, shipping) arm would silently lose its
    # workspace gate. This job pins BOTH arms explicitly: a default-features workspace
    # clippy + nextest run (the dash arm -- the arm the differential / driver-matrix /
    # perf-gate jobs also run end-to-end), plus a focused hashbrown-index store leg so a
    # store-only change cannot dodge the fallback arm by touching nothing the all-features
    # workspace run rebuilds. The flip record (five paired throughput rounds, the organic
    # memory sweep, the hugepages A/B) lives on #285.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # The DEFAULT (dash) arm's lint bar (the all-features clippy job lints the fallback).
      - name: clippy (default features, dash arm)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # The DEFAULT (dash) arm's workspace suite (the all-features test job covers the
      # hashbrown fallback arm).
      - name: nextest run (workspace, default features)
        run: cargo nextest run --profile ci --workspace
      # The fallback arm, focused: the store suite (including the index_growth growth
      # analogs) with the hashbrown index explicitly selected, plus the dashtable crate's
      # own oracle-parity suite.
      - name: nextest store (hashbrown-index fallback) + dashtable crate
        run: cargo nextest run --profile ci -p ironcache-store -p ironcache-dashtable --features ironcache-store/hashbrown-index

  fuzz:
    name: fuzz (parser, bounded)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    # The documented parser fuzz gate (#534, #95, HARDENING.md/TESTING.md): run the
    # cargo-fuzz/libFuzzer target `fuzz/fuzz_targets/decode.rs` over
    # `ironcache_protocol::decode`. The decoder is the first code an unauthenticated
    # peer reaches and release is `panic = "abort"`, so a missed decode panic is a
    # whole-process crash (remote parser DoS); this job is the merge-blocking gate
    # that proves no seed-reachable input panics the decoder.
    #
    # The fuzz crate is STANDALONE (root Cargo.toml `exclude`s it + it has its own
    # empty `[workspace]`), so it needs NIGHTLY (libFuzzer sanitizer codegen) and
    # never touches the workspace build/lock/deny gate.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Nightly is REQUIRED: `cargo fuzz build` compiles with the address/leak
      # sanitizer instrumentation (`-Z` codegen), which is nightly-only.
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          # The fuzz crate has its own target/lock; cache them under a distinct key
          # so it does not collide with the stable-toolchain workspace caches.
          workspaces: "fuzz -> fuzz/target"
      # Prebuilt cargo-fuzz binary (fast; avoids a from-source `cargo install`). The explicit
      # `tool:` form is used (the bare `@cargo-fuzz` ref does not put the binary on PATH).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Bounded per-PR budget: a 60s campaign seeded from fuzz/corpus/decode/. Fast
      # enough for a merge gate; libFuzzer exits non-zero (fails the job) on the
      # first panic/timeout/OOM. A longer nightly campaign (e.g. -max_total_time=900
      # on a schedule) is a reasonable future add; this job is the per-PR floor.
      #
      # `--target x86_64-unknown-linux-gnu` is EXPLICIT: libFuzzer's sanitizer
      # instrumentation is incompatible with a statically linked libc, and cargo-fuzz
      # otherwise picked up a musl target here ("sanitizer is incompatible with
      # statically linked libc" / "can't find crate for std"). The gnu target is the
      # runner host and has a dynamic libc, so the sanitizer links.
      #
      # The workspace sets RUSTFLAGS="-D warnings" globally; cargo-fuzz APPENDS its
      # own sanitizer -Cllvm-args to RUSTFLAGS, and the fuzz crate's generated harness
      # is not warning-clean under `-D warnings`, so unset it for this job only.
      - name: cargo fuzz run decode (bounded)
        working-directory: fuzz
        env:
          RUSTFLAGS: ""
        run: cargo +nightly fuzz run decode --target x86_64-unknown-linux-gnu -- -max_total_time=60 -rss_limit_mb=4096

  invariant-lints:
    name: invariant lints (INVARIANTS.md)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci/check-rust-invariants.sh

  deny:
    name: cargo-deny (advisories, licenses, bans, sources)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Per-PR merge-blocking supply-chain gate (SUPPLY_CHAIN.md). Runs all four
      # cargo-deny checks against the committed deny.toml + Cargo.lock. The action
      # is pinned by commit SHA (v2.0.20) so the policy result is reproducible.
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories licenses bans sources
