# SPDX-License-Identifier: MIT OR Apache-2.0
#
# PROD-8 DIFFERENTIAL wire-compatibility gate. Runs `tests/differential.rs`, which boots the REAL
# IronCache server and a REAL `redis-server` side by side and replays a curated, deterministic
# command corpus against both, asserting the RESP2 replies match (with a documented allowlist for
# the correct-by-design differences: OBJECT ENCODING names, SCAN cursor/order, error-prefix-not-text,
# random-element commands).
#
# WHY A SEPARATE WORKFLOW (not folded into rust.yml's test matrix): this gate has an EXTERNAL
# dependency, a real `redis-server` binary on PATH, that the rest of the workspace tests do not. The
# differential test SKIPS itself cleanly when redis is absent (so `cargo test --workspace` in rust.yml
# stays green on a runner without redis, and a developer without redis is not blocked); this job is
# the one place that INSTALLS redis and then runs the test EXPLICITLY, so a skip here would be a
# wiring bug, not a pass. Keeping it separate means a redis-install or redis-version hiccup cannot
# flake the main test gate.
#
# It builds a PINNED `redis-server` FROM SOURCE (an exact Redis tag, the binary the test spawns on
# an ephemeral port), guarded by the same `has_cargo` idiom rust.yml/perf-gate.yml use so a docs-only
# repo state is a no-op, and runs only when Rust sources / the test / the workflow change.
#
# WHY A PINNED ORACLE (not `apt-get install redis-server`): the gate asserts IronCache's RESP2
# replies match a REAL redis-server, so redis IS the correctness oracle. A bare apt install pulls
# whatever the runner image happens to ship (~7.x today, a different build tomorrow), so the oracle
# would DRIFT with the runner and a differential pass/fail would stop being reproducible; a Redis
# behavior change could then silently move the gate. Building one EXACT tag from source pins the
# oracle to a single reproducible version, independent of the runner image and the apt archive.
#
# WHY REDIS 7.4 SPECIFICALLY (not 7.2 / 8.0): the corpus includes cross-server DUMP/RESTORE round
# trips, so the oracle can only be a Redis whose DUMP RDB footer version IronCache's RESTORE accepts,
# up to SUPPORTED_RDB_VERSION (see crates/ironcache-server/src/rdb.rs). That ceiling is now 14, which
# covers Redis 7.4's RDB version 12, so a payload DUMPed by 7.4 round-trips (verified empirically: the
# full corpus is 0 divergences on 7.4.9). 7.4 is chosen over 7.2 because it adds hash field TTLs
# (HEXPIRE), which lets the corpus exercise IronCache's field-TTL hash RESTORE decode (the
# RDB_TYPE_HASH_METADATA / _LISTPACK_EX encodings) against a real server; that section self-gates to a
# no-op on an older oracle that lacks HEXPIRE. 8.0 is a candidate for a later bump (its RDB version 14
# is exactly the ceiling), left for a separate re-verification of the full corpus. Raise this in
# lockstep with SUPPORTED_RDB_VERSION and re-verify the corpus when IronCache learns a newer RDB version.
name: differential

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/differential.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"
  # The PINNED differential oracle: an EXACT Redis tag built from source (see the header for why).
  # 7.4.9 is the newest Redis 7.4 patch. Its DUMP/RESTORE RDB version (12) is within the ceiling this
  # build accepts (SUPPORTED_RDB_VERSION = 14 in rdb.rs), and 7.4 adds HEXPIRE so the corpus can
  # exercise the field-TTL hash RESTORE decode. Bump this in lockstep with SUPPORTED_RDB_VERSION (and
  # re-verify the full corpus is 0 divergences) when IronCache's RESTORE learns a newer RDB version.
  REDIS_ORACLE_VERSION: "7.4.9"

jobs:
  guard:
    name: guard (skip until a Cargo project exists)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_cargo: ${{ steps.check.outputs.has_cargo }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: check
        shell: bash
        run: |
          if [ -f Cargo.toml ] && [ -f Cargo.lock ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::repo is docs-only (no Cargo.toml/Cargo.lock); differential gate is a no-op"
          fi

  differential:
    name: differential (vs real redis-server)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
      - name: Build + install the PINNED redis-server oracle from source
        run: |
          set -euo pipefail
          # Build ONE exact Redis tag from source and put it on PATH as the differential oracle. This
          # pins the oracle to a single reproducible version (no apt-archive/runner-image drift). The
          # test spawns `redis-server` from PATH on its own ephemeral port (it never uses a system
          # service), so a source build is all it needs; nothing is autostarted, so there is nothing
          # to stop. BUILD_TLS=no keeps the build minimal (the corpus is plaintext RESP2) and uses
          # Redis's own bundled deps (jemalloc/lua/hiredis), so no apt redis-server is ever involved.
          curl -fsSL "https://github.com/redis/redis/archive/refs/tags/${REDIS_ORACLE_VERSION}.tar.gz" \
            -o "${RUNNER_TEMP}/redis-src.tar.gz"
          mkdir -p "${RUNNER_TEMP}/redis-src"
          tar -xzf "${RUNNER_TEMP}/redis-src.tar.gz" -C "${RUNNER_TEMP}/redis-src" --strip-components=1
          make -C "${RUNNER_TEMP}/redis-src" -j"$(nproc)" BUILD_TLS=no redis-server
          sudo install -m 0755 "${RUNNER_TEMP}/redis-src/src/redis-server" /usr/local/bin/redis-server
          # Fail LOUDLY if the binary on PATH is not the pinned version (a silent oracle swap would
          # defeat the whole point of pinning).
          redis-server --version
          redis-server --version | grep -q "v=${REDIS_ORACLE_VERSION}"
      - name: Run the differential corpus
        # Explicitly target the one test; `--nocapture` surfaces the run summary + any divergence
        # report in the job log. With redis installed the test RUNS (it does not skip).
        run: cargo test -p ironcache --test differential -- --nocapture
