# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Chart end-to-end gate: spin up a kind cluster, install the chart as a single STANDALONE
# node, wait for it to become Ready, and run `helm test` -- the RESP PING connectivity smoke
# check (templates/tests/test-connection.yaml) -- against the real published image. This
# complements deploy-lint (which statically renders + kubeconform-validates the chart) with a
# LIVE install proving the chart actually deploys and serves. Runs only when the chart changes.
name: chart-e2e

on:
  pull_request:
    paths:
      - "deploy/helm/ironcache/**"
      - ".github/workflows/chart-e2e.yml"

permissions:
  contents: read

env:
  HELM_VERSION: "v3.15.4"

jobs:
  install-test:
    name: helm install + helm test (kind)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Create a kind cluster
        uses: helm/kind-action@0025e74a8c7512023d06dc019c617aa3cf561fde # v1.10.0
        with:
          # Pin the k8s version to 1.30 so the run is deterministic AND exercises the native
          # SleepAction preStop path (beta/default-on from 1.30; the chart gates it on >=1.30).
          # The action's default is 1.29, where SleepAction is alpha-off -- a moving, wrong target.
          version: v0.23.0
          node_image: kindest/node:v1.30.0
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: ${{ env.HELM_VERSION }}
      - name: Install (standalone) + wait + helm test
        run: |
          set -euo pipefail
          kubectl create namespace ic-test
          # A single STANDALONE node: fast + deterministic (no 3-node quorum formation, which is
          # slow/flaky in CI). This exercises install -> readiness (--wait) -> the RESP PING helm
          # test against the real, public, multi-arch ghcr.io/elares/ironcache:<appVersion> image.
          helm install ic deploy/helm/ironcache -n ic-test \
            --set replicas=1 --set cluster.enabled=false \
            --wait --timeout 5m
          kubectl -n ic-test get statefulset,pod
          # `helm test` creates the PING Pod, waits for it, and fails the command if it exits
          # non-zero. NOT `--logs`: the test hook's `hook-succeeded` delete policy removes the Pod
          # on success, and `helm test --logs` then races it ("pods not found") -- a false failure
          # even though the PING passed. The Diagnostics-on-failure step below dumps logs when a
          # real failure leaves the Pod in place (hook-succeeded does not delete a FAILED Pod).
          helm test ic -n ic-test
      - name: Upgrade + re-test (the rolling-update path)
        run: |
          set -euo pipefail
          # P2-3's other half: a chart can lint clean and INSTALL fine yet fail to UPGRADE. Change
          # values that hit BOTH roll mechanisms, so this is a real rolling update (readiness gate
          # + minReadySeconds + the preStop lame-duck), not a no-op re-apply:
          #   - extraConfig  -> rewrites the ConfigMap, flipping the `checksum/config` annotation
          #                     (the chart's own config-change-rolls-pods mechanism), AND proves
          #                     the node still BOOTS on the re-rendered TOML (the parse is strict);
          #   - logLevel     -> changes a container arg directly in the pod template.
          helm upgrade ic deploy/helm/ironcache -n ic-test \
            --set replicas=1 --set cluster.enabled=false \
            --set logLevel=debug --set extraConfig='timeout = 30' \
            --wait --timeout 5m
          kubectl -n ic-test rollout status statefulset/ic-ironcache --timeout=5m
          # The node must still serve RESP after the roll.
          helm test ic -n ic-test
          echo "OK: upgrade rolled the pod and the cache still answers PING"
      - name: Cluster-secret preserved across a bare `helm upgrade` (#747)
        run: |
          set -euo pipefail
          # Regression gate for #747, and the ONLY place it can run: the guard is a `lookup` of the
          # live Secret, which is always empty under `helm template`/--dry-run, so deploy-lint can
          # never exercise this branch. A kind cluster can. Before #747 a bare upgrade regenerated
          # the random cluster_secret -> peers reject each other -> split-brain.
          kubectl create namespace ic-sec
          # No --wait: this asserts a TEMPLATE/lookup invariant, not pod readiness (a 1-node raft
          # node need not become Ready for the Secret to exist), which also keeps the job fast.
          helm install ics deploy/helm/ironcache -n ic-sec \
            --set replicas=1 --set cluster.enabled=true
          before="$(kubectl -n ic-sec get secret ics-ironcache-secret -o jsonpath='{.data.cluster_secret}')"
          [ -n "$before" ] || { echo "ERROR: no cluster_secret was generated on install"; exit 1; }
          helm upgrade ics deploy/helm/ironcache -n ic-sec \
            --set replicas=1 --set cluster.enabled=true
          after="$(kubectl -n ic-sec get secret ics-ironcache-secret -o jsonpath='{.data.cluster_secret}')"
          if [ "$before" != "$after" ]; then
            echo "ERROR: cluster_secret ROTATED across a bare helm upgrade -- this splits a live cluster (#747 regressed)"
            exit 1
          fi
          echo "OK: cluster_secret preserved across helm upgrade (lookup branch verified live)"
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n ic-test get all || true
          kubectl -n ic-test describe pod -l app.kubernetes.io/instance=ic || true
          kubectl -n ic-test logs -l app.kubernetes.io/instance=ic --tail=200 || true
          kubectl -n ic-test get events --sort-by=.lastTimestamp || true
          # The cluster-secret namespace (only exists once that step has started).
          kubectl -n ic-sec get all,secret 2>/dev/null || true
          kubectl -n ic-sec get events --sort-by=.lastTimestamp 2>/dev/null || true
