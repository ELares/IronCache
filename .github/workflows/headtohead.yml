# SPDX-License-Identifier: MIT OR Apache-2.0
#
# On-demand IronCache vs competitor HEAD-TO-HEAD on a LINUX runner (BENCHMARK.md #8 /
# #96, the A4 harness). This exists because the per-PR perf-gate only ratchets IronCache
# against ITSELF (HEAD vs merge-base); it never measures IronCache against redis/valkey.
# This job runs scripts/bench/headtohead.sh on ubuntu-latest, where (unlike the macOS dev
# box) SO_REUSEPORT load-balances AND `taskset` exists, so the server and load generator
# run on DISJOINT pinned cores. That makes the throughput comparison far cleaner than the
# contention-bound macOS run.
#
# HONESTY: a GitHub-hosted runner is a small (4 vCPU), shared, virtualized box, so this is
# INDICATIVE, not publishable. The authoritative verdict still needs a dedicated
# bare-metal pinned-Linux runner vs the pinned valkey-server 9.1.0 (docs/bench/
# COMPETITORS.md). This job answers the OPEN question the macOS run could not: on Linux
# (working SO_REUSEPORT + core pinning), is IronCache's per-core throughput competitive?
#
# workflow_dispatch only (never on push/PR): it is a manual measurement, not a gate.
name: headtohead

on:
  workflow_dispatch:
    inputs:
      competitor:
        description: "Competitor server to install and measure against."
        type: choice
        default: redis
        options:
          - redis
          - valkey
          - dragonfly
          - keydb
          - memcached
      value_size:
        description: "SET value bytes (also the bytes-per-key value size)."
        type: string
        default: "128"
      keycount:
        description: "Distinct keys populated for the bytes-per-key measurement."
        type: string
        default: "200000"
      duration_secs:
        description: "Measured closed-loop pass duration (seconds)."
        type: string
        default: "8"
      ironcache_shards:
        description: "Override IronCache shard (= runtime-thread) count; blank = one per pinned core. Probes thread-oversubscription (e.g. 1 shard on 2 pinned cores)."
        type: string
        default: ""
      eviction:
        description: "EVICTION workload: boot every server in its evicting cache mode (set maxmemory BELOW the dataset). Measures sustained eviction, not the never-evict baseline."
        type: boolean
        default: false
      maxmemory:
        description: "Memory ceiling for the run (e.g. 64mb). Set this BELOW the dataset when eviction=true so eviction fires; blank = the harness default (4gb, never evicts)."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  guard:
    name: guard (skip until a Cargo project exists)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_cargo: ${{ steps.check.outputs.has_cargo }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: check
        shell: bash
        run: |
          if [ -f Cargo.toml ] && [ -f Cargo.lock ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::repo is docs-only (no Cargo.toml/Cargo.lock); headtohead is a no-op"
          fi

  headtohead:
    name: headtohead (IronCache vs competitor, pinned Linux)
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # NATIVE release build (the runner's own arch), so only the stable toolchain.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2

      # redis-cli is required by the harness (readiness PING, INFO used_memory, --pipe
      # populate). util-linux provides `taskset` (present by default, installed
      # defensively) so the harness pins the server and client to disjoint cores.
      - name: Install redis-tools + taskset
        run: sudo apt-get update && sudo apt-get install -y redis-tools util-linux

      # Install the chosen competitor server. apt's version is whatever the runner's
      # Ubuntu ships (redis ~7.x, valkey ~7.2.x), so the harness flags the verdict as a
      # version-mismatch STAND-IN; that is fine for the Linux per-core throughput signal.
      - name: Install competitor (${{ inputs.competitor }})
        run: |
          set -euo pipefail
          case "${{ inputs.competitor }}" in
            valkey)
              sudo apt-get install -y valkey-server || sudo apt-get install -y redis-server
              ;;
            dragonfly)
              # DragonflyDB ships a prebuilt x86_64 binary on its GitHub releases (no apt
              # package). Grab the latest stable, install it, and point the harness at it
              # via COMPETITOR_BIN (persisted to later steps through GITHUB_ENV). It speaks
              # RESP, so redis-cli (PING/INFO/--pipe) and the loadgen work unchanged.
              curl -fsSL -o /tmp/dragonfly.tar.gz \
                https://github.com/dragonflydb/dragonfly/releases/latest/download/dragonfly-x86_64.tar.gz
              tar -xzf /tmp/dragonfly.tar.gz -C /tmp
              sudo install -m 0755 /tmp/dragonfly-x86_64 /usr/local/bin/dragonfly
              /usr/local/bin/dragonfly --version
              echo "COMPETITOR_BIN=/usr/local/bin/dragonfly" >> "$GITHUB_ENV"
              ;;
            keydb)
              # KeyDB is a multi-threaded Redis FORK (RESP / redis-cli compatible), but it is
              # NOT in the default Ubuntu apt repos and the project is DORMANT (last release
              # v6.3.4, Oct 2023). Try the most robust install in order; if BOTH paths fail we
              # exit NON-ZERO (no silent fall back to redis - that would mislabel the
              # competitor and the harness would report a redis verdict under the keydb name).
              #
              # (a) The official KeyDB apt repo (download.keydb.dev/open-source-dist) for the
              #     runner's codename. NOTE: as of this writing the repo has NO 'noble' (24.04)
              #     Release file, so on the current ubuntu-latest (noble) this path is EXPECTED
              #     to fail and we fall through to (b). It is kept first so that if/when KeyDB
              #     publishes a noble repo, or the runner image is an older codename, apt is
              #     preferred (it resolves deps cleanly).
              # (b) The prebuilt jammy .deb from the KeyDB package archive. `dpkg -i` then
              #     `apt-get -f install -y` pulls runtime deps. On noble the jammy deb's
              #     libcurl4 dep was renamed to libcurl4t64 (the t64 transition), so this may
              #     fail to satisfy deps; that surfaces as a non-zero exit (loud failure), which
              #     is what we want.
              set -x
              CODENAME="$(. /etc/os-release && echo "$VERSION_CODENAME")"
              installed=0
              # (a) apt repo for the runner codename.
              if echo "deb https://download.keydb.dev/open-source-dist ${CODENAME} main" \
                   | sudo tee /etc/apt/sources.list.d/keydb.list >/dev/null \
                 && sudo wget -qO /etc/apt/trusted.gpg.d/keydb.gpg \
                      https://download.keydb.dev/open-source-dist/keyring.gpg \
                 && sudo apt-get update \
                 && sudo apt-get install -y keydb-server; then
                installed=1
              else
                echo "::notice::KeyDB apt repo install failed for codename '${CODENAME}' (the repo has no noble Release as of 2026-06); trying the prebuilt jammy .deb."
                sudo rm -f /etc/apt/sources.list.d/keydb.list
                sudo apt-get update || true
              fi
              # (b) prebuilt jammy .deb fallback (the keydb-latest symlink resolves to v6.3.4).
              if [ "$installed" -ne 1 ]; then
                BASE="https://download.keydb.dev/pkg/open_source/deb/ubuntu22.04_jammy/amd64/keydb-latest"
                if curl -fsSL -o /tmp/keydb-server.deb \
                     "${BASE}/keydb-server_6.3.4-1~jammy1_amd64.deb" \
                   && curl -fsSL -o /tmp/keydb-tools.deb \
                     "${BASE}/keydb-tools_6.3.4-1~jammy1_amd64.deb"; then
                  # dpkg first (it may leave unmet deps), then `apt-get -f install -y` resolves
                  # them. If deps cannot be satisfied (e.g. libcurl4 vs libcurl4t64 on noble),
                  # apt exits non-zero and the step fails loudly.
                  sudo dpkg -i /tmp/keydb-tools.deb /tmp/keydb-server.deb || true
                  sudo apt-get -f install -y
                  installed=1
                fi
              fi
              if [ "$installed" -ne 1 ] || ! command -v keydb-server >/dev/null 2>&1; then
                echo "::error::Could NOT install KeyDB via the apt repo OR the prebuilt jammy .deb. KeyDB is dormant (last release v6.3.4, 2023) and its apt repo lacks a noble Release; the jammy deb may not satisfy noble's t64 libcurl. Failing loudly instead of falling back to redis (which would mislabel the competitor)."
                exit 1
              fi
              # Point the harness at the resolved keydb-server (mirrors how dragonfly sets
              # COMPETITOR_BIN). It is redis-cli/RESP compatible, so PING/INFO/--pipe + loadgen
              # all work; only the threading flag differs (--server-threads, handled in the
              # harness keydb branch).
              KEYDB_BIN="$(command -v keydb-server)"
              keydb-server --version
              echo "COMPETITOR_BIN=${KEYDB_BIN}" >> "$GITHUB_ENV"
              set +x
              ;;
            memcached)
              # Memcached does NOT speak RESP, so the harness drives it over the memcached TEXT
              # protocol with `nc` (netcat-openbsd) and measures MEMORY ONLY (bytes-per-key);
              # throughput/latency are out of scope. libmemcached-tools provides memccat/memcdump/
              # memcping (handy diagnostics); the harness itself uses raw `nc`, so netcat-openbsd
              # is the load-bearing dependency. Memcached IS in the default Ubuntu apt repos.
              sudo apt-get install -y memcached libmemcached-tools netcat-openbsd
              MEMCACHED_BIN="$(command -v memcached || echo /usr/bin/memcached)"
              "${MEMCACHED_BIN}" --version || "${MEMCACHED_BIN}" -h | head -n1 || true
              echo "COMPETITOR_BIN=${MEMCACHED_BIN}" >> "$GITHUB_ENV"
              ;;
            *)
              sudo apt-get install -y redis-server
              ;;
          esac

      - name: Run head-to-head (auto-pinned via taskset)
        env:
          VALUE_SIZE: ${{ inputs.value_size }}
          KEYCOUNT: ${{ inputs.keycount }}
          KEYSPACE: ${{ inputs.keycount }}
          DURATION_SECS: ${{ inputs.duration_secs }}
          WARMUP_SECS: "3"
          IRONCACHE_SHARDS: ${{ inputs.ironcache_shards }}
          # EVICT=1 when the eviction toggle is on; the harness then boots every server in
          # its evicting cache mode. The MAXMEMORY input is exported only if non-empty (see
          # the run body) so a blank keeps the harness default (4gb, never evicts).
          EVICT: ${{ inputs.eviction == true && '1' || '0' }}
          MAXMEMORY_INPUT: ${{ inputs.maxmemory }}
        run: |
          set -euo pipefail
          # Export MAXMEMORY ONLY when the input is non-empty: an empty export would shadow
          # the harness default (4gb) with a blank, which the harness would reject. With a
          # value it sets the ceiling (set it BELOW the dataset when EVICT=1 so eviction
          # fires continuously).
          if [ -n "${MAXMEMORY_INPUT}" ]; then
            export MAXMEMORY="${MAXMEMORY_INPUT}"
          fi
          # The harness resolves the competitor (valkey-server, else redis-server),
          # auto-pins on Linux (taskset present), and writes headtohead.json + per-server
          # artifacts to the out dir. It never fails the job: the ADR-0017 verdict is
          # reported, not enforced (this is a measurement, not a gate).
          bash scripts/bench/headtohead.sh --out-dir "${RUNNER_TEMP}/h2h"

      - name: Summarize verdict to the job summary
        if: always()
        run: |
          set -euo pipefail
          J="${RUNNER_TEMP}/h2h/headtohead.json"
          if [ -f "$J" ]; then
            {
              echo "## head-to-head (pinned Linux, INDICATIVE)"
              echo '```json'
              cat "$J"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no headtohead.json produced"
          fi

      - name: Upload head-to-head artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: headtohead-${{ inputs.competitor }}-linux
          path: ${{ runner.temp }}/h2h/
          if-no-files-found: warn
