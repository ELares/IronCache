# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Deploy-artifact lint gate (#363). The repo ships production deployment artifacts
# (the Helm chart, the raw k8s manifests, the docker-compose files, the two
# Dockerfiles) that no other workflow validates: image.yml only runs on `v*` tags,
# and rust.yml lints Rust, not YAML. This gate lints them on every PR that TOUCHES
# them (the `paths:` filter), so a malformed chart / manifest / Dockerfile is caught
# before it ships rather than when an operator first applies it.
#
# It renders the chart (default AND with the console enabled) and validates the
# output against the Kubernetes schemas, validates the raw manifests the same way,
# and hadolints both Dockerfiles. Third-party actions are tag-pinned to match the
# CI-workflow convention (rust.yml / docs.yml use `@v4`-style tags; the release/
# image workflows use SHA pins).
name: deploy-lint

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "deploy/**"
      - "Dockerfile"
      - "Dockerfile.console"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  # Validate against a recent stable Kubernetes API surface.
  KUBE_VERSION: "1.30.0"
  KUBECONFORM_VERSION: "0.6.7"
  HELM_VERSION: "v3.15.4"

jobs:
  helm:
    name: helm lint + kubeconform (rendered chart)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}
      - name: helm lint (defaults + console enabled)
        run: |
          set -euo pipefail
          helm lint deploy/helm/ironcache
          helm lint deploy/helm/ironcache \
            --set console.enabled=true --set console.replicas=2
      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v
      - name: helm template | kubeconform (both value sets)
        run: |
          set -euo pipefail
          # -ignore-missing-schemas skips CRDs (ServiceMonitor) that have no core
          # schema; -strict rejects unknown fields in the core resources.
          # The clusterTls variant renders the self-signed-cert-as-own-CA path (clusterTls.enabled
          # with an EMPTY clusterTls.ca): the StatefulSet mounts cluster.ca + points
          # IRONCACHE_CLUSTER_CA_PATH at it, so the Secret must emit cluster.ca (defaulted to the
          # cert). #660 shipped that; this variant guards the regression.
          cluster_tls_set="--set cluster.enabled=true --set clusterTls.enabled=true --set clusterTls.cert=DUMMYCERT --set clusterTls.key=DUMMYKEY"
          # The networkPolicy variant PINS service.clientPort=6379 so the guard's literal bus
          # port (16379 = clientPort+10000) is deliberate and cannot go stale if the values.yaml
          # DEFAULT clientPort ever changes.
          np_set="--set networkPolicy.enabled=true --set cluster.enabled=true --set replicas=3 --set service.clientPort=6379"
          # The k3s overlay is a real values file; render THROUGH it so a schema violation or
          # a bad key in values-k3s.yaml fails CI (helm auto-validates -f files against the schema).
          k3s_set="-f deploy/helm/ironcache/values-k3s.yaml"
          gd_set="--set metrics.grafanaDashboard.enabled=true"
          # The monitoring CRD surface: the PrometheusRule (rules embedded from the in-chart
          # alerts file) plus the ServiceMonitor scrape knobs. -ignore-missing-schemas skips the
          # CRDs themselves, so the guards below assert the CONTENT actually rendered.
          mon_set="--set metrics.prometheusRule.enabled=true --set metrics.serviceMonitor.enabled=true --set metrics.serviceMonitor.sampleLimit=50000"
          # The console-UI Ingress needs BOTH console.enabled and console.ingress.enabled.
          ing_set="--set console.enabled=true --set console.ingress.enabled=true --set console.ingress.className=traefik"
          for extra in "" "--set console.enabled=true --set console.replicas=2" "$cluster_tls_set" "--set topologySpread.enabled=true" "$np_set" "$k3s_set" "$gd_set" "$mon_set" "$ing_set"; do
            echo "::group::helm template ${extra:-(defaults)}"
            # $extra must WORD-SPLIT into multiple `--set` flags, so it is
            # intentionally unquoted (SC2086 does not apply here).
            # shellcheck disable=SC2086
            rendered="$(helm template ic deploy/helm/ironcache --kube-version "${KUBE_VERSION}" $extra)"
            printf '%s\n' "$rendered" \
              | kubeconform -strict -summary -verbose \
                  -ignore-missing-schemas \
                  -kubernetes-version "${KUBE_VERSION}"
            # Content guards below use `grep <<< "$rendered"` here-strings, NOT
            # `printf ... | grep -q`: under `set -o pipefail`, `grep -q` closes the pipe on
            # its first match, and for a LARGE render (e.g. the embedded Grafana dashboard)
            # the still-writing printf then takes SIGPIPE, whose non-zero status pipefail
            # propagates -- turning a SUCCESSFUL match into a false failure. A here-string
            # has no upstream writer to break.
            case "$extra" in
              *console.ingress.enabled=true*)
                # Assert the Ingress rendered AND targets the CONSOLE Service (never the cache --
                # RESP is L4 and an HTTP Ingress cannot front it).
                grep -q "kind: Ingress" <<< "$rendered" \
                  || { echo "ERROR: console.ingress.enabled rendered no Ingress"; exit 1; }
                grep -q "name: ic-ironcache-console" <<< "$rendered" \
                  || { echo "ERROR: console Ingress does not target the console Service"; exit 1; }
                ;;
              *console.enabled=true*)
                # Guard against a broken `console.enabled` gate silently rendering
                # nothing (kubeconform is happy with zero console objects, so assert
                # the console Deployment/Service actually appeared).
                grep -q "ic-ironcache-console" <<< "$rendered" \
                  || { echo "ERROR: console.enabled=true rendered no console resources"; exit 1; }
                ;;
              *clusterTls.enabled=true*)
                # #660: with clusterTls on and an empty ca, the Secret must still emit cluster.ca
                # (defaulted to the cert), or the StatefulSet mounts a missing key and the pod
                # fails at start. Assert the key is present in the rendered Secret.
                grep -q "cluster.ca:" <<< "$rendered" \
                  || { echo "ERROR: clusterTls.enabled rendered no cluster.ca Secret key"; exit 1; }
                ;;
              *networkPolicy.enabled=true*)
                # Assert the NetworkPolicy actually rendered AND carries the peer-only bus/repl
                # rule (client+10000 / client+20000). A silently-empty gate would pass kubeconform
                # (zero NetworkPolicies is valid) while shipping no isolation at all.
                grep -q "kind: NetworkPolicy" <<< "$rendered" \
                  || { echo "ERROR: networkPolicy.enabled=true rendered no NetworkPolicy"; exit 1; }
                grep -q "port: 16379" <<< "$rendered" \
                  || { echo "ERROR: NetworkPolicy missing the cluster-bus (client+10000) rule"; exit 1; }
                ;;
              *values-k3s.yaml*)
                # The k3s overlay is the single-node standalone posture: no PDB (replicas=1
                # gate) and exactly one replica. Guards the edge posture from silent regression.
                if grep -q "kind: PodDisruptionBudget" <<< "$rendered"; then
                  echo "ERROR: k3s overlay rendered a PDB (expected none at replicas=1)"; exit 1
                fi
                grep -qE "^  replicas: 1$" <<< "$rendered" \
                  || { echo "ERROR: k3s overlay did not render replicas: 1"; exit 1; }
                ;;
              *prometheusRule.enabled=true*)
                # The rules are embedded from alerts/ironcache-alerts.yml via .Files.Get; assert the
                # PrometheusRule rendered AND actually carries rule bodies (a bad path or a moved
                # file would otherwise yield a valid-but-EMPTY spec that kubeconform happily skips).
                grep -q "kind: PrometheusRule" <<< "$rendered" \
                  || { echo "ERROR: prometheusRule.enabled rendered no PrometheusRule"; exit 1; }
                grep -q "ironcache.availability" <<< "$rendered" \
                  || { echo "ERROR: PrometheusRule has no rule groups (alerts file not embedded?)"; exit 1; }
                grep -q "sampleLimit: 50000" <<< "$rendered" \
                  || { echo "ERROR: ServiceMonitor sampleLimit passthrough did not render"; exit 1; }
                ;;
              *grafanaDashboard.enabled=true*)
                # Assert the dashboard ConfigMap rendered AND carries the sidecar discovery label
                # (a silently-empty gate would ship no dashboard while kubeconform stays happy).
                grep -q "ic-ironcache-grafana-dashboard" <<< "$rendered" \
                  || { echo "ERROR: grafanaDashboard.enabled rendered no dashboard ConfigMap"; exit 1; }
                grep -qE "grafana_dashboard: \"1\"" <<< "$rendered" \
                  || { echo "ERROR: dashboard ConfigMap missing the grafana_dashboard sidecar label"; exit 1; }
                ;;
            esac
            echo "::endgroup::"
          done

      - name: values.schema.json rejects invalid values (negative tests)
        run: |
          set -euo pipefail
          # Helm auto-validates values against values.schema.json on `helm template`, so the
          # positive value-sets above already exercise the schema. These NEGATIVE tests guard
          # the schema's REJECTION power: if a future edit drops a rule, `helm template` would
          # start ACCEPTING the bad value and this step fails. Each case MUST make helm exit non-zero.
          bad_case() {
            local desc="$1"; shift
            echo "::group::reject: $desc"
            if helm template ic deploy/helm/ironcache "$@" >/dev/null 2>/tmp/schema-err; then
              echo "ERROR: schema did NOT reject an invalid value ($desc) -- helm template succeeded"; exit 1
            fi
            # Match a SCHEMA-specific message (not the generic "the schema(s)" boilerplate that any
            # helm error might mention) so a non-schema template failure is not mistaken for a pass.
            grep -qiE 'Additional property|Invalid type|Must be|length must be|does not match pattern|must be one of' /tmp/schema-err \
              || { echo "ERROR: '$desc' failed for a NON-schema reason:"; cat /tmp/schema-err; exit 1; }
            echo "OK (rejected): $desc"
            echo "::endgroup::"
          }
          bad_case "top-level typo key"            --set replias=3
          bad_case "replicas below minimum"        --set replicas=0
          bad_case "auth.enabled without a secret" --set auth.enabled=true
          bad_case "bad service.type enum"         --set service.type=Bogus
          bad_case "clusterTls.enabled no cert"    --set cluster.enabled=true --set clusterTls.enabled=true
          # Positive guard: fullnameOverride is read by _helpers.tpl but absent from values.yaml,
          # so additionalProperties:false must still ACCEPT it (regression guard for that trap).
          echo "::group::accept: fullnameOverride"
          helm template ic deploy/helm/ironcache --set fullnameOverride=ic-alt >/dev/null \
            || { echo "ERROR: schema wrongly REJECTED a valid fullnameOverride"; exit 1; }
          echo "OK (accepted): fullnameOverride"
          echo "::endgroup::"

      - name: preStop SleepAction version gate (>=1.30 only)
        run: |
          set -euo pipefail
          # SleepAction is alpha-off in 1.29 and only beta/default-on from 1.30. The chart MUST
          # omit the preStop `sleep` handler below 1.30 (an empty preStop is an INVALID pod that
          # the API server rejects -- a real install break, caught live once by chart-e2e on a
          # 1.29 kind node). Guard the gate boundary so it cannot regress.
          r129="$(helm template ic deploy/helm/ironcache --kube-version 1.29.0)"
          r130="$(helm template ic deploy/helm/ironcache --kube-version 1.30.0)"
          if grep -q 'sleep:' <<< "$r129"; then
            echo "ERROR: preStop sleep rendered on k8s 1.29 (alpha-off) -- would create an invalid pod"; exit 1
          fi
          grep -q 'sleep:' <<< "$r130" \
            || { echo "ERROR: preStop sleep NOT rendered on k8s 1.30 (should be beta/default-on)"; exit 1; }
          echo "OK: preStop omitted on 1.29, rendered on 1.30"

  k8s:
    name: kubeconform (raw manifests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
      - name: kubeconform deploy/k8s
        run: |
          set -euo pipefail
          kubeconform -strict -summary -verbose \
            -ignore-missing-schemas \
            -kubernetes-version "${KUBE_VERSION}" \
            deploy/k8s/*.yaml

  docker:
    name: hadolint (Dockerfiles)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: hadolint Dockerfile.console
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.console

  actionlint:
    name: actionlint (workflow syntax + shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint
      - name: "actionlint (all workflows; shellcheck run blocks)"
        run: |
          set -euo pipefail
          # actionlint auto-discovers .github/workflows/*.yml, validates the action
          # input schemas + expression syntax, and shellchecks every run: block
          # (shellcheck is preinstalled on the runner). This is the only PR-CI
          # validation available for the tag-triggered release/image workflows.
          actionlint -color

  compose:
    name: docker compose config (validate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate every compose file parses + resolves
        env:
          # The cluster compose uses a fail-fast required var (${IRONCACHE_CLUSTER_SECRET:?});
          # deploy-lint only checks the file STRUCTURE, not real secrets, so a
          # placeholder lets `config` interpolate. Add more here if a compose file
          # introduces another required var.
          IRONCACHE_CLUSTER_SECRET: deploy-lint-placeholder
        run: |
          set -euo pipefail
          for f in deploy/compose/docker-compose*.yml; do
            echo "::group::docker compose -f $f config"
            # `config` fully parses + interpolates + schema-checks the file; -q
            # suppresses the rendered output, leaving only errors.
            docker compose -f "$f" config -q
            echo "::endgroup::"
          done
