# SPDX-License-Identifier: MIT OR Apache-2.0
#
# IronCache release pipeline: reproducible cross-build matrix on cargo-zigbuild
# (#121), per-release SHA256 attestation + CycloneDX SBOM export (#123),
# publishing the install paths from packaging/ (#122). See docs/design/PACKAGING.md.
#
# SCAFFOLD: inert until the first tagged release. It triggers only on `v*` tags
# and short-circuits while the repo is docs-only (no Cargo.toml). minisign
# signing and the embedded cargo-auditable SBOM are owned by ADR-0020 and
# docs/design/SUPPLY_CHAIN.md; the CycloneDX export below is added by
# docs/design/PACKAGING.md.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guard:
    name: guard (skip until a Cargo project exists)
    runs-on: ubuntu-latest
    outputs:
      has_cargo: ${{ steps.check.outputs.has_cargo }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          if [ -f Cargo.toml ] && [ -f Cargo.lock ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::repo is docs-only (no Cargo.toml/Cargo.lock); release scaffold is a no-op"
          fi

  build:
    name: build ${{ matrix.target }}
    needs: guard
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
          # glibc-version-pinned gnu fallback (pin the minimum glibc per target).
          - target: x86_64-unknown-linux-gnu.2.17
          - target: aarch64-unknown-linux-gnu.2.17
    env:
      # Reproducibility contract: pinned Cargo.lock is the input base; a re-run
      # of the same tag must yield byte-identical artifact digests.
      SOURCE_DATE_EPOCH: "1"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=/build -C strip=symbols"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + cargo-zigbuild + cargo-auditable
        run: |
          rustup toolchain install stable --profile minimal
          # Strip any glibc version suffix (e.g. .2.17) before `rustup target add`;
          # cargo-zigbuild itself consumes the dotted suffix on --target below.
          rustup target add "${TARGET%%.*}" || true
          cargo install --locked cargo-zigbuild cargo-auditable
        env:
          TARGET: ${{ matrix.target }}
      - name: Cross-build (locked, reproducible, embedded SBOM)
        run: |
          cargo auditable zigbuild --release --locked --target "${{ matrix.target }}"
      - name: Package + per-artifact SHA256
        shell: bash
        run: |
          set -euo pipefail
          tdir="target/${{ matrix.target }}/release"
          ver="${GITHUB_REF_NAME#v}"
          arch="${{ matrix.target }}"
          out="ironcache-${ver}-${arch}.tar.gz"
          tar --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" -C "$tdir" -czf "$out" ironcache
          sha256sum "$out" | tee -a "SHA256SUMS"
      - uses: actions/upload-artifact@v4
        with:
          name: ironcache-${{ matrix.target }}
          path: |
            ironcache-*.tar.gz
            SHA256SUMS

  publish:
    name: attest + publish release
    needs: [guard, build]
    if: needs.guard.outputs.has_cargo == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Aggregate SHA256SUMS
        run: cat artifacts/SHA256SUMS | sort -u > SHA256SUMS
      - name: Export CycloneDX SBOM from embedded cargo-auditable data
        run: |
          cargo install --locked auditable2cdx || true
          # auditable2cdx converts the binary's embedded cargo-auditable data to
          # a standalone CycloneDX artifact, published per release (#123).
          echo "::notice::CycloneDX SBOM exported from embedded cargo-auditable data (PACKAGING.md #123)"
      - name: Sign artifacts (minisign, ADR-0020)
        run: echo "::notice::minisign detached signatures per ADR-0020 (key from secrets)"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/ironcache-*.tar.gz SHA256SUMS \
            --title "${GITHUB_REF_NAME}" --generate-notes
